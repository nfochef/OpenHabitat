services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: timescaledb
    restart: unless-stopped
    environment:
    - POSTGRES_USER=openhabitat
    - POSTGRES_PASSWORD=dev
    - POSTGRES_DB=openhabitat
    volumes:
    - ./data/postgres:/var/lib/postgresql/data
    networks:
     - openhabitat

    ports:
    - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: openhabitat-redis
    restart: unless-stopped
    networks:
      - openhabitat

networks:
  openhabitat:
    driver: bridge 

